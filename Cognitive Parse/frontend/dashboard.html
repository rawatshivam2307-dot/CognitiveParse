<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CognitiveParse Dashboard</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="page dashboard-page">
        <section class="hero reveal">
            <div>
                <p class="kicker">Error Intelligence</p>
                <h1>Analytics Dashboard</h1>
                <p class="hero-copy">Measure error patterns, track trends, and prioritize teaching focus areas.</p>
            </div>
            <div class="hero-actions">
                <a href="/" class="btn ghost">Back To Analyzer</a>
                <a href="/api/report/markdown" class="btn">Open Report</a>
                <button type="button" id="refreshDashboardBtn" class="btn soft">Refresh Dashboard</button>
                <button type="button" id="clearErrorsBtn" class="btn soft">Clear Stored Errors</button>
            </div>
        </section>

        <section class="stats-grid reveal delay-1">
            <article class="stat-card">
                <p>Total Errors</p>
                <h2 id="totalErrors">0</h2>
            </article>
            <article class="stat-card">
                <p>Dominant Category</p>
                <h2 id="dominantCategory">N/A</h2>
            </article>
            <article class="stat-card">
                <p>Report Generated</p>
                <h2 id="generatedAt">N/A</h2>
            </article>
        </section>

        <section class="panel reveal delay-2">
            <h3>Category Distribution</h3>
            <canvas id="categoryChart" width="980" height="320"></canvas>
        </section>

        <section class="panel reveal delay-3">
            <h3>Recent Errors</h3>
            <div class="table-wrap">
                <table id="errorsTable">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Category</th>
                            <th>Message</th>
                            <th>Suggestion</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="/script.js"></script>
</body>
</html>

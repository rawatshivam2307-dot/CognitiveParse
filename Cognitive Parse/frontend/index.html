<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CognitiveParse</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="page">
        <section class="hero reveal">
            <div>
                <p class="kicker">Compiler + Analytics</p>
                <h1>CognitiveParse</h1>
                <p class="hero-copy">Analyze Python-subset syntax, classify errors, and get guided correction suggestions instantly.</p>
            </div>
            <div class="hero-actions">
                <a href="/dashboard" class="btn ghost">View Dashboard</a>
            </div>
        </section>

        <section class="panel reveal delay-1">
            <form id="analyzeForm" class="editor-form">
                <div class="form-head">
                    <label for="codeInput">Code Workspace</label>
                    <span class="hint">Supports general Python syntax (based on your installed Python version)</span>
                </div>
                <textarea id="codeInput" name="code" placeholder="Example:
x = 4 + 2
print(x)
if x:
"></textarea>

                <div class="actions">
                    <button type="submit" class="btn">Analyze Syntax</button>
                    <button type="button" id="sampleBtn" class="btn soft">Load Sample Error</button>
                    <button type="button" id="clearBtn" class="btn soft">Clear</button>
                </div>
            </form>

            <section id="resultBox" class="result hidden" aria-live="polite"></section>
        </section>
    </main>

    <script src="/script.js"></script>
</body>
</html>
